name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm ci

      - name: Unit + invariant tests
        run: npm test

      - name: ZIP writer -- independent verification (Python zipfile)
        run: npm run verify:zip

      - name: Upload human-verification package (round-tripped .docx + EXPECTED.md oracle)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: word-verification-package
          path: /tmp/ar-zip-roundtrip
          if-no-files-found: error

      - name: Build fresh (to a temp path, not the committed html/ file)
        run: node build/build.js --release /tmp/fresh-autoreviewer-workbench.html

      - name: Committed html/autoreviewer-workbench.html must match a fresh build from source
        run: |
          if ! diff -q html/autoreviewer-workbench.html /tmp/fresh-autoreviewer-workbench.html > /dev/null; then
            echo "::error::html/autoreviewer-workbench.html is stale relative to source. Run 'npm run build:html' and commit the result."
            diff html/autoreviewer-workbench.html /tmp/fresh-autoreviewer-workbench.html | head -50
            exit 1
          fi

      - name: Compliance checklist
        run: npm run check:compliance -- html/autoreviewer-workbench.html

      - name: Assert committed build is single-file
        run: |
          test -f html/autoreviewer-workbench.html
          ! grep -qE '(src|href)="https?://' html/autoreviewer-workbench.html
          ! grep -q 'fetch(' html/autoreviewer-workbench.html
