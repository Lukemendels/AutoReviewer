name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Unit + invariant tests
        run: npm test

      - name: Build dist/autoreviewer-workbench.html
        run: npm run build

      - name: Compliance checklist
        run: npm run check:compliance

      - name: Assert dist artifact is single-file
        run: |
          test -f dist/autoreviewer-workbench.html
          ! grep -qE '(src|href)="https?://' dist/autoreviewer-workbench.html
          ! grep -q 'fetch(' dist/autoreviewer-workbench.html
